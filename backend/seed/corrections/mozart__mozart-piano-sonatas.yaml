# MEI source-corrections overlay — Mozart Piano Sonatas (DCML)
#
# See ADR-027 (mechanism), ADR-030 (why the xml:id locator is stable), and
# backend/seed/corrections/README.md (field reference). Applied by
# mei_normalizer Pass 0 at ingest, before the structural passes.
#
# Reference edition for every entry: the Neue Mozart-Ausgabe (NMA), which the
# DCML corpus itself follows (see the corpus README). The NMA is freely
# consultable at the Digital Mozart Edition: https://dme.mozarteum.at/DME/nma
#
# source_sha pins the DCML mozart_piano_sonatas commit each entry was authored
# against (HEAD at authoring: 5337257a5318711e6302cfe85c3f1a6ade3c6271). On a
# source bump, Pass 0's pre-state check (ADR-027 §3) re-validates every entry.

composer: mozart
corpus: mozart-piano-sonatas
corrections:
  # --- C2: K331/ii Menuetto — Trio, missing second-strain start-repeat -------
  # The Trio is a rounded binary with both strains repeated. Its second strain
  # (mc65–100) ends with a repeat barline (mc100 carries :|, MEI right="rptend")
  # but the DCML/MuseScore source encodes no start-repeat (|:) at its opening
  # (mc65), so playback's repeat expansion jumps past the strain boundary back
  # to the previous |: (the Menuetto's, mc19) instead of repeating the Trio's
  # second strain. The NMA prints |: at the start of the Trio's second strain.
  #
  # The Trio's *first* strain (mc49) is deliberately NOT corrected: editions
  # (NMA included) print no |: there — the Trio opens a new section, so its
  # opening repeat is implicit. Only the second-strain omission is an erratum.
  # (How Verovio expands the first strain's repeat without an explicit |: is a
  # separate rendering question, not a source error — it stays out of the overlay.)
  - movement: k331/movement-2
    target:
      xml_id: e65xqli
      fallback: "mc=65 — Trio second strain, first measure (its closing :| is at mc100)"
    field: repeat-start
    expected: null
    corrected: rptstart
    rationale: >-
      DCML/MuseScore omits the start-repeat at the Trio's second strain (mc65),
      though the strain is repeated (closing :| at mc100). The NMA prints |: at
      the start of the Trio's second strain. Without it, repeat expansion jumps
      back to the Menuetto's |: (mc19). The Trio's first-strain opening is left
      uncorrected: editions print no |: there (implicit at the new section).
    class: errata
    upstream: none
    source_sha: 5337257a5318711e6302cfe85c3f1a6ade3c6271
    added: "2026-06-29 Francisco"

  # --- B3: K332/ii m24 — spurious C# (should be C natural) ------------------
  # m24 is a cadential bar (V65–I–V64–V/HC in B-flat). The treble 16th-note
  # figure has four C5s: C-natural at the end of beat 1, C-sharp on beat 2
  # (chromatic, correct), then a C on the first note of beat 4, and the bar's
  # last C. The NMA prints a natural on the beat-4 C (cancelling the beat-2
  # sharp), so both it and the bar's last C sound C-natural. DCML/MuseScore
  # prints no accidental there, leaving the beat-2 C# to carry forward as an
  # implicit sharp — so the app plays C# on both. Restoring the printed natural
  # on the beat-4 C fixes both notes: Pass 9 (ADR-028) then resolves the
  # gestural pitch of this note and the bar's last same-pitch C to natural.
  - movement: k332/movement-2
    target:
      xml_id: c106gvd1
      fallback: "mc=24 staff=1 — beat-4 C5 (4th of four C5s in the treble figure)"
    field: accid
    expected: null
    corrected: "n"
    rationale: >-
      DCML/MuseScore leaves the beat-4 C5 with no printed accidental, so the
      beat-2 C# carries forward and the note (and the bar's last C5) play C#.
      The NMA prints a natural here, making both C-natural. Restore the printed
      natural; Pass 9 then resolves the gestural pitch of this and the bar's
      last C5 to natural.
    class: errata
    upstream: none
    source_sha: 5337257a5318711e6302cfe85c3f1a6ade3c6271
    added: "2026-06-29 Francisco"

  # --- B3: K279/ii m51 — missing cautionary flat on the bass B4 -------------
  # In m51 the RH has an ornamental B-natural in octave 5; an accidental binds
  # only its own pitch+octave+staff, so it must not affect the LH B4 an octave
  # lower in the other staff. The DCML/MuseScore export drops the key-signature
  # flat on that LH B4 (a converter over-reach corrected for playback by Pass 9,
  # ADR-028), and also omits the *printed* accidental. The NMA prints a
  # cautionary flat on the first LH B4 to make the B-flat unambiguous against
  # the RH B-natural. Restore that printed cautionary flat.
  - movement: k279/movement-2
    target:
      xml_id: g1mnbfyc
      fallback: "mc=53 mn=51 staff=2 layer=5 — first bass B4 of the measure"
    field: accid
    expected: null
    corrected: "f"
    rationale: >-
      The NMA prints a cautionary flat on the first LH B4 of m51 (disambiguating
      it from the RH ornamental B-natural an octave above); DCML/MuseScore omits
      the printed accidental (and the export drops its key-signature flat, which
      Pass 9 restores for playback). Restore the printed cautionary flat to match
      the edition.
    class: errata
    upstream: none
    source_sha: 5337257a5318711e6302cfe85c3f1a6ade3c6271
    added: "2026-06-29 Francisco"
