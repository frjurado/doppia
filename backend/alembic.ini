# Alembic configuration for Doppia backend.
#
# The database URL is NOT hardcoded here — it is read from the DATABASE_URL
# environment variable in migrations/env.py. The sqlalchemy.url key is left
# intentionally blank so that Alembic raises an error if env.py ever fails to
# set it (rather than silently connecting to nothing).

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# Leave blank — overridden by env.py using os.environ["DATABASE_URL"].
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
