# DCML Mozart Piano Sonatas — browser staging subset
#
# Five sonatas (15 movements) covering a range of keys and meters, sufficient
# to make the corpus browser columns look real during Component 2 development.
#
# Used with: python scripts/prepare_dcml_corpus.py
#   --repo-path ~/src/mozart_piano_sonatas
#   --config scripts/dcml_corpora/mozart-browser-staging.toml
#   --output /tmp/mozart-browser-staging.zip
#
# Source: https://github.com/DCMLab/mozart_piano_sonatas
# Licence: CC BY-SA 4.0 (ADR-009)
#
# Sonatas included:
#   K.279 — C major   (4/4, 3/4, 3/8)
#   K.280 — F major   (3/4, 6/8, 3/8)
#   K.283 — G major   (3/4, 4/4, 3/8)
#   K.331 — A major   (6/8, 3/4, 2/4) — movements 1-2 exist as test fixtures
#   K.332 — F major   (3/4, 3/4, 2/4)
#
# The full corpus (18 sonatas) is in mozart-piano-sonatas.toml.
# Component 9 is responsible for ingesting the full corpus.

[composer]
slug = "mozart"
name = "Wolfgang Amadeus Mozart"
sort_name = "Mozart, Wolfgang Amadeus"
birth_year = 1756
death_year = 1791
nationality = "Austrian"
wikidata_id = "Q254"

[corpus]
slug = "piano-sonatas"
title = "Piano Sonatas"
source_repository = "DCMLab/mozart_piano_sonatas"
analysis_source = "DCML"
licence = "CC-BY-SA-4.0"
licence_notice = "© DCML contributors. Licensed under CC BY-SA 4.0. https://creativecommons.org/licenses/by-sa/4.0/"

