app = "doppia-staging"
primary_region = "lhr"

[build]
  dockerfile = "backend/Dockerfile"
  context = "."

  [build.args]
    VITE_SUPABASE_URL = "https://vywprfptbicpvuygksad.supabase.co"
    VITE_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5d3ByZnB0YmljcHZ1eWdrc2FkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzQ1ODEsImV4cCI6MjA5MjExMDU4MX0.yakwqnLrfFk-mljsVaMrXjAF1YLdrln61MWSoWZvD4o"

[processes]
  app    = "uvicorn main:app --host 0.0.0.0 --port 8000"
  worker = "celery -A services.celery_app worker --loglevel=info --concurrency=1"

[env]
  ENVIRONMENT = "staging"
  AUTH_MODE = "supabase"
  PORT = "8000"
  R2_BUCKET_NAME = "doppia-staging"
  R2_ENDPOINT_URL = "https://b0c58a6078065a6edcd5cf3ecced703d.r2.cloudflarestorage.com"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/v1/health"
    timeout = "5s"

[[vm]]
  processes  = ["app"]
  memory     = "512mb"
  cpu_kind   = "shared"
  cpus       = 1

[[vm]]
  processes  = ["worker"]
  memory     = "1gb"
  cpu_kind   = "shared"
  cpus       = 1