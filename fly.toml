app = "doppia-staging"
primary_region = "lhr"

[build]
  dockerfile = "backend/Dockerfile"
  context = "."

[env]
  ENVIRONMENT = "staging"
  AUTH_MODE = "supabase"
  PORT = "8000"
  R2_BUCKET_NAME = "doppia-staging"
  R2_ENDPOINT_URL = "https://b0c58a6078065a6edcd5cf3ecced703d.r2.cloudflarestorage.com"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/v1/health"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1