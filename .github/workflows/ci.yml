name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Lint (fast, no services, no full dep install)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python linters
        run: pip install black==24.10.0 isort==5.13.2 ruff==0.8.4

      - name: black --check
        run: black --check backend/

      - name: isort --check
        run: isort --check backend/

      - name: ruff check
        run: ruff check backend/

      - name: Doc cross-reference lint
        run: python scripts/lint_doc_crossrefs.py

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: stylelint
        working-directory: frontend
        run: npm run lint:css

      - name: Frontend tests
        working-directory: frontend
        run: npm test

  # ---------------------------------------------------------------------------
  # Job 1a — E2E (Playwright): the anonymous public read journey (Component 10
  # Step 14). Runs against a vite preview of the production build with the
  # backend stubbed per-test, so no services or seeded data are needed.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser (chromium)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build SPA
        working-directory: frontend
        run: npm run build

      - name: Run Playwright e2e
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 1b — Dependency audit
  #
  # pip-audit (backend) is BLOCKING as of the Phase-2 PyJWT migration
  # (Component 10 Step 6): python-jose — whose unfixable advisory set
  # (PYSEC-2025-185 + transitive ecdsa/pyasn1) forced report-only since
  # Phase 1 — is gone, so the backend requirements audit is clean and can gate.
  #
  # npm audit (frontend) stays report-only (continue-on-error on the step):
  # it only sees ESLint's dev-tooling transitives, which never ship to a user
  # and churn constantly, so gating main on them would block unrelated PRs.
  # ---------------------------------------------------------------------------
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit==2.10.1

      # Blocking: fails the job (and CI) on any backend advisory.
      - name: pip-audit (backend requirements)
        run: pip-audit -r backend/requirements.txt --no-deps

      - name: Set up Node 20
        if: ${{ !cancelled() }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Report-only: surfaced in logs but never blocks (dev-tooling transitives).
      - name: npm audit (frontend lockfile)
        if: ${{ !cancelled() }}
        continue-on-error: true
        working-directory: frontend
        run: npm audit

  # ---------------------------------------------------------------------------
  # Job 2 — Unit tests (fast, no Docker, parallel with lint)
  # ---------------------------------------------------------------------------
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run unit tests
        env:
          ENVIRONMENT: local
          AUTH_MODE: local
        run: >-
          pytest backend/tests/unit/ -v
          --cov=backend
          --cov-report=term-missing
          --cov-fail-under=60

      # Verovio render regression guards (Component 10 Step 13). Informational
      # per ADR-013: a Verovio version bump that changes rendering fails these,
      # surfacing the deltas for review before the M14 upgrade ships. Regenerate
      # with UPDATE_VEROVIO_SNAPSHOTS=1 when the change is intentional.
      - name: Run Verovio snapshot guards
        run: pytest backend/tests/snapshots/ -v

  # ---------------------------------------------------------------------------
  # Job 3 — Integration tests (slow, requires services, blocked on unit)
  # ---------------------------------------------------------------------------
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: doppia
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: localpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d doppia"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      neo4j:
        # NEO4J_PLUGINS downloads APOC from the internet on first start;
        # allow up to 200 s (20 × 10 s) for the health check to pass.
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/localpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p localpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      # MinIO cannot be declared as a GH Actions service because the image
      # requires a positional command ("server /data") that services do not
      # support.  We start it explicitly and poll the liveness endpoint.
      - name: Start MinIO
        run: |
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          timeout 60 bash -c \
            'until curl -sf http://localhost:9000/minio/health/live; do sleep 2; done'

      # PostgreSQL services in GH Actions do not run init.sql from a volume
      # mount, so we create the extensions explicitly using psycopg2-binary
      # (already installed from requirements.txt).
      - name: Create PostgreSQL extensions
        run: |
          python - <<'EOF'
          import psycopg2
          conn = psycopg2.connect(
              host="localhost", dbname="doppia",
              user="postgres", password="localpassword",
          )
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute('CREATE EXTENSION IF NOT EXISTS vector')
          cur.execute('CREATE EXTENSION IF NOT EXISTS "uuid-ossp"')
          conn.close()
          EOF

      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:localpassword@localhost/doppia
        run: alembic upgrade head

      - name: Create MinIO bucket
        run: |
          python - <<'EOF'
          import boto3
          boto3.client(
              "s3",
              endpoint_url="http://localhost:9000",
              aws_access_key_id="minioadmin",
              aws_secret_access_key="minioadmin",
              region_name="us-east-1",
          ).create_bucket(Bucket="doppia-local")
          EOF

      - name: Run integration tests
        env:
          DOPPIA_RUN_INTEGRATION: "1"
          ENVIRONMENT: local
          AUTH_MODE: local
          DATABASE_URL: postgresql+asyncpg://postgres:localpassword@localhost/doppia
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: localpassword
          REDIS_URL: redis://localhost:6379
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          R2_ENDPOINT_URL: http://localhost:9000
          R2_BUCKET_NAME: doppia-local
          R2_ACCESS_KEY_ID: minioadmin
          R2_SECRET_ACCESS_KEY: minioadmin
        run: pytest -m integration backend/tests/integration/ -v

  # ---------------------------------------------------------------------------
  # Job 4 — Graph tests (Neo4j only; seed + validate + integration tests)
  # ---------------------------------------------------------------------------
  graph:
    name: Graph tests
    runs-on: ubuntu-latest
    needs: unit
    services:
      # Seeding writes the canonical English translation overlay to PostgreSQL
      # as a logically-atomic unit with each Neo4j node (ADR-006 §3); the seed
      # script therefore requires DATABASE_URL, so this job needs Postgres too.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: doppia
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: localpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d doppia"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      neo4j:
        # NEO4J_PLUGINS downloads APOC from the internet on first start;
        # allow up to 200 s (20 × 10 s) for the health check to pass.
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/localpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p localpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      # PostgreSQL services in GH Actions do not run init.sql from a volume
      # mount, so we create the extensions explicitly using psycopg2-binary
      # (already installed from requirements.txt).
      - name: Create PostgreSQL extensions
        run: |
          python - <<'EOF'
          import psycopg2
          conn = psycopg2.connect(
              host="localhost", dbname="doppia",
              user="postgres", password="localpassword",
          )
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute('CREATE EXTENSION IF NOT EXISTS vector')
          cur.execute('CREATE EXTENSION IF NOT EXISTS "uuid-ossp"')
          conn.close()
          EOF

      # The seed populates the translation-overlay tables (concept_translation
      # et al.), so the schema must exist before seeding (ADR-006 §3).
      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:localpassword@localhost/doppia
        run: alembic upgrade head

      - name: Seed all domains
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: localpassword
          DATABASE_URL: postgresql+asyncpg://postgres:localpassword@localhost/doppia
        run: python scripts/seed.py --all

      - name: Validate graph structure
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: localpassword
        run: python scripts/validate_graph.py

      - name: Run graph integration tests
        env:
          DOPPIA_RUN_INTEGRATION: "1"
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: localpassword
        run: pytest -m integration backend/tests/graph/ -v
