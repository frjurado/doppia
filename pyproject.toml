[tool.black]
line-length = 88
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 88

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W"]  # I (isort) omitted — isort runs separately and owns import order
ignore = [
    "E402",  # module-level import not at top — intentional for load_dotenv/sys.path bootstrapping
    "E501",  # line too long — black is the authoritative line-length enforcer
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
testpaths = ["backend/tests"]
pythonpath = [".", "backend", "scripts"]
# Snapshot guards (backend/tests/snapshots) are populated as of Component 10
# Step 13 and run in CI as their own step; no longer ignored. A bare `pytest`
# now also collects them (fast, no Docker).
markers = [
    "integration: tests requiring docker compose up (postgres, minio, redis)",
]
